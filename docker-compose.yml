version: '3.8'

services:
  # 1. 你的 Python 核心算法容器
  app:
    build: .
    container_name: xiamen-flask-app
    restart: always
    # 注意：这里不再向外网暴露端口！只在 Docker 内部网暴露 5000
    expose:
      - "5000"

  # 2. 新增的 Nginx 前台容器
  nginx:
    image: nginx:alpine
    container_name: xiamen-nginx
    restart: always
    ports:
      - "80:80"  # Nginx 负责守住服务器对外的 80 大门
    volumes:
      # 把我们刚才写的接待指南，挂载到 Nginx 肚子里替换默认配置
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app      # 告诉 Nginx：等 Python 老大哥先启动，你再启动