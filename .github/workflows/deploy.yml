name: 厦门换乘系统自动部署

# 触发条件：只要有人往 main 分支推送代码，流水线就启动
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # 给机器人分配一台临时的 Linux 小电脑

    steps:
      # 1. 机器人把你最新的代码拉取到临时电脑上
      - name: 📥 获取最新代码
        uses: actions/checkout@v3

      # 2. 机器人把最新代码自动传到你的阿里云服务器上
      - name: 🚀 传输代码到阿里云
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          source: "."
          target: "/root/xiamen-metro"

      # 3. 机器人自动登录服务器，执行 Docker Compose 重启命令
      - name: ⚙️ 执行双容器架构构建与发布
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            cd /root/xiamen-metro
            
            # --- 以下是升级为 Nginx 架构后的新版部署逻辑 ---
            
            echo "🛑 正在优雅地关闭旧的容器和网络..."
            # 使用大管家一键关闭并清理之前的环境
            docker-compose down
            
            echo "🏗️ 正在基于最新的 docker-compose.yml 重新构建并启动..."
            # -d 代表后台运行，--build 代表强制用最新代码重新打包
            docker-compose up -d --build
            
            echo "🧹 顺手清理一下用不到的旧垃圾镜像（释放服务器空间）..."
            docker image prune -f
            
            echo "🎉 Nginx + Flask 大厂级架构部署大功告成！"
